*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a73e8;--blue-bg:#e8f0fe;
  --green:#34a853;--green-bg:#e6f4ea;
  --red:#ea4335;--red-bg:#fce8e6;
  --yellow:#f9ab00;--yellow-bg:#fef7e0;
  --purple:#7b1fa2;--purple-bg:#f3e5f5;
  --surface:#fff;--bg:#f8f9fa;
  --text:#202124;--text2:#5f6368;--border:#dadce0;
  --shadow:0 1px 2px rgba(60,64,67,.3),0 1px 3px rgba(60,64,67,.15);
  --shadow2:0 1px 3px rgba(60,64,67,.3),0 4px 8px rgba(60,64,67,.15);
  --ease:cubic-bezier(0.4,0,0.2,1);
  --radius:8px;
}
html{scroll-behavior:smooth}
body{font-family:'Google Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Top Bar */
.top-bar{
  height:56px;display:flex;align-items:center;padding:0 24px;
  background:var(--surface);box-shadow:var(--shadow);position:sticky;top:0;z-index:50;
}
.top-bar h1{font-size:18px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:10px}
.top-bar .logo{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}

/* Page Container */
.page-container{max-width:1200px;margin:0 auto;padding:24px}

/* Quadrant Section */
.quadrant-section{
  background:var(--surface);border-radius:12px;box-shadow:var(--shadow2);
  padding:24px;margin-bottom:32px;position:relative;
}
.quadrant-section h2{font-size:20px;font-weight:500;margin-bottom:16px;color:var(--text)}
.quadrant-wrap{position:relative;width:100%;overflow-x:auto}
.quadrant-wrap svg{width:100%;min-width:700px;display:block}
svg text{font-family:'Google Sans',system-ui,-apple-system,sans-serif}

/* Tooltip */
.tooltip{
  position:fixed;z-index:200;pointer-events:none;
  background:var(--surface);border-radius:8px;box-shadow:var(--shadow2);
  padding:12px 16px;max-width:280px;opacity:0;transition:opacity 150ms var(--ease);
  font-size:13px;line-height:1.5;
}
.tooltip.show{opacity:1}
.tooltip .tt-name{font-weight:600;font-size:14px;margin-bottom:4px}
.tooltip .tt-role{color:var(--text2);font-size:12px;margin-bottom:6px}
.tooltip .tt-row{display:flex;justify-content:space-between;gap:12px}
.tooltip .tt-label{color:var(--text2)}
.tooltip .tt-val{font-weight:500}
.tooltip .tt-val.pos{color:var(--green)}
.tooltip .tt-val.neg{color:var(--red)}
.tooltip .tt-val.neu{color:var(--yellow)}
.tooltip .tt-click{margin-top:6px;font-size:11px;color:var(--blue);text-align:center}

/* Detail Overlay */
.detail-overlay{
  position:fixed;top:0;right:0;width:420px;height:100vh;z-index:100;
  background:var(--surface);box-shadow:-4px 0 24px rgba(60,64,67,.2);
  transform:translateX(100%);transition:transform 300ms var(--ease);
  overflow-y:auto;padding:32px 28px;
}
.detail-overlay.open{transform:translateX(0)}
.detail-close{
  position:absolute;top:16px;right:16px;width:36px;height:36px;border:none;
  background:var(--bg);border-radius:50%;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;color:var(--text2);
  transition:background 150ms var(--ease);
}
.detail-close:hover{background:var(--border)}
.detail-badge{
  display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:500;margin-bottom:12px;
}
.detail-name{font-size:24px;font-weight:500;margin-bottom:4px}
.detail-role{font-size:14px;color:var(--text2);margin-bottom:20px}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.detail-section h3::before{content:'';width:14px;height:2px;background:var(--blue);border-radius:1px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric-card{
  background:var(--bg);border-radius:8px;padding:12px;
}
.metric-card .mc-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.metric-card .mc-val{font-size:18px;font-weight:500}
.metric-card .mc-note{font-size:11px;color:var(--text2);margin-top:2px}
.metric-card .mc-val.pos{color:var(--green)}
.metric-card .mc-val.neg{color:var(--red)}
.metric-card .mc-val.neu{color:var(--yellow)}
.detail-text{font-size:14px;color:var(--text);line-height:1.7}
.detail-text .hl{color:var(--blue);font-weight:500}
.detail-text .hl-green{color:var(--green);font-weight:500}
.detail-text .hl-red{color:var(--red);font-weight:500}
.detail-source{font-size:11px;color:var(--text2);margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.est{font-style:italic;color:var(--text2)}

/* Backdrop */
.backdrop{
  position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.3);
  opacity:0;pointer-events:none;transition:opacity 200ms var(--ease);

.backdrop.show{opacity:1;pointer-events:auto}

/* Summary Sections */
.summary-section{

.summary-section h2{font-size:18px;font-weight:500;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.summary-section h2 .icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}

/* Role Cards */
.role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.role-card{border-radius:10px;padding:20px;border:1.5px solid var(--border);transition:box-shadow 200ms var(--ease)}
.role-card:hover{box-shadow:var(--shadow2)}
.role-card h3{font-size:15px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.role-card p{font-size:13px;color:var(--text2);line-height:1.6}
.role-card .role-examples{margin-top:10px;font-size:12px;color:var(--text2);padding-top:8px;border-top:1px solid var(--border)}

/* Profit Table */
.profit-table{width:100%;border-collapse:collapse;font-size:13px}
.profit-table th{
  text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);
  font-weight:600;color:var(--text2);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;
  position:sticky;top:0;background:var(--surface);

.profit-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.profit-table tr:hover{background:var(--bg)}
.profit-table .pos{color:var(--green);font-weight:500}
.profit-table .neg{color:var(--red);font-weight:500}
.profit-table .neu{color:var(--yellow);font-weight:500}
.profit-table .na{color:var(--text2);font-style:italic}
.table-wrap{overflow-x:auto;margin-top:8px}

/* Insight Cards */
.insight-list{display:flex;flex-direction:column;gap:12px}
.insight-item{
  display:flex;gap:16px;padding:16px;border-radius:8px;background:var(--bg);
  border-left:4px solid var(--blue);

.insight-num{

/* Footer */

/* ── Helpers ── */
const $ = id => document.getElementById(id);
const NS = 'http://www.w3.org/2000/svg';
const wait = ms => new Promise(r => setTimeout(r, ms));

function show(el,{dur=500,delay:d=0,dx=0,dy=0,scale:sc}={}){
  return new Promise(resolve=>{
    if(!el){resolve();return}
    const t0=`translate(${dx}px,${dy}px)`+(sc!=null?` scale(${sc})`:'');
    el.style.transform=t0;el.style.opacity='0';
    setTimeout(()=>{
      el.style.transition=`opacity ${dur}ms var(--ease),transform ${dur}ms var(--ease)`;
      el.style.opacity='1';el.style.transform='translate(0,0) scale(1)';
      setTimeout(resolve,dur);
    },d);
  });
}
function showAll(els,stagger=80,opts={}){
  return Promise.all(els.map((el,i)=>show(el,{...opts,delay:(opts.delay||0)+i*stagger})));
}
function drawPath(el,dur=600,d=0){
  return new Promise(resolve=>{
    if(!el){resolve();return}
    let len;try{len=el.getTotalLength()}catch(e){len=200}
    el.style.strokeDasharray=len;el.style.strokeDashoffset=len;el.style.opacity='1';
    setTimeout(()=>{
      el.style.transition=`stroke-dashoffset ${dur}ms var(--ease)`;el.style.strokeDashoffset='0';
      setTimeout(resolve,dur);
    },d);
  });
}

function svgEl(tag,attrs={}){
  const el=document.createElementNS(NS,tag);
  for(let[k,v]of Object.entries(attrs))el.setAttribute(k,v);
  el.style.opacity='0';return el;
}
function addTo(parent,...els){els.forEach(el=>parent.appendChild(el));return els}

/* ── Chart Constants ── */
const CL=100, CR=950, CT=55, CB=630; // chart bounds
const CW=CR-CL, CH=CB-CT;
const MX=CL+CW/2, MY=CT+CH/2; // center

function mapQ(qx,qy){ return { cx: CL + qx*CW, cy: CB - qy*CH }; }
function dotR(rm){ if(!rm) return 14; return Math.max(12, Math.min(40, Math.log10(rm)*10)); }

const QCOLORS = {
  tl:{fill:'rgba(26,115,232,0.06)',label:'全棧 Full Stack',lc:'rgba(26,115,232,0.45)',dot:'#e8f0fe',stroke:'#1a73e8'},
  tr:{fill:'rgba(249,171,0,0.06)',label:'機器人 + 對接',lc:'rgba(249,171,0,0.45)',dot:'#fef7e0',stroke:'#f9ab00'},
  bl:{fill:'rgba(52,168,83,0.06)',label:'純 WMS / SaaS / ERP',lc:'rgba(52,168,83,0.45)',dot:'#e6f4ea',stroke:'#34a853'},
  br:{fill:'rgba(123,31,162,0.06)',label:'數據/AI 平台',lc:'rgba(123,31,162,0.45)',dot:'#f3e5f5',stroke:'#7b1fa2'},
};

const PROFIT_STROKE = {pos:'#34a853',neg:'#ea4335',neu:'#f9ab00',na:'#dadce0'};

/* ── Build Quadrant SVG ── */
function buildQuadrant(){
  const svg = $('qsvg');
  svg.innerHTML = '';

  // Quadrant background fills
  const bgTL = svgEl('rect',{x:CL,y:CT,width:CW/2,height:CH/2,fill:QCOLORS.tl.fill,rx:0});bgTL.style.opacity='1';
  const bgTR = svgEl('rect',{x:MX,y:CT,width:CW/2,height:CH/2,fill:QCOLORS.tr.fill,rx:0});bgTR.style.opacity='1';
  const bgBL = svgEl('rect',{x:CL,y:MY,width:CW/2,height:CH/2,fill:QCOLORS.bl.fill,rx:0});bgBL.style.opacity='1';
  const bgBR = svgEl('rect',{x:MX,y:MY,width:CW/2,height:CH/2,fill:QCOLORS.br.fill,rx:0});bgBR.style.opacity='1';
  addTo(svg, bgTL, bgTR, bgBL, bgBR);

  // Axes
  const axH = svgEl('line',{x1:CL,y1:MY,x2:CR,y2:MY,stroke:'#dadce0','stroke-width':1.5});axH.id='ax-h';
  const axV = svgEl('line',{x1:MX,y1:CT,x2:MX,y2:CB,stroke:'#dadce0','stroke-width':1.5});axV.id='ax-v';
  addTo(svg, axH, axV);

  // Axis labels
  const axLabels = [];
  const alLeft = svgEl('text',{x:CL,y:CB+28,'text-anchor':'start','dominant-baseline':'middle',fill:'#5f6368','font-size':13,'font-weight':600});
  alLeft.textContent='← 有自研 WMS';alLeft.style.opacity='0';axLabels.push(alLeft);
  const alRight = svgEl('text',{x:CR,y:CB+28,'text-anchor':'end','dominant-baseline':'middle',fill:'#5f6368','font-size':13,'font-weight':600});
  alRight.textContent='冇自研 WMS →';alRight.style.opacity='0';axLabels.push(alRight);
  const alTop = svgEl('text',{x:CL-14,y:CT,'text-anchor':'end','dominant-baseline':'middle',fill:'#5f6368','font-size':12,'font-weight':600,transform:`rotate(-90,${CL-14},${CT})`});
  alTop.textContent='有機器人 ↑';alTop.style.opacity='0';axLabels.push(alTop);
  const alBot = svgEl('text',{x:CL-14,y:CB,'text-anchor':'start','dominant-baseline':'middle',fill:'#5f6368','font-size':12,'font-weight':600,transform:`rotate(-90,${CL-14},${CB})`});
  alBot.textContent='↓ 冇機器人';alBot.style.opacity='0';axLabels.push(alBot);
  addTo(svg, ...axLabels);

  // Quadrant labels (light, background text)
  const qLabels = [];
  const qlTL = svgEl('text',{x:CL+(MX-CL)/2, y:CT+40,'text-anchor':'middle','dominant-baseline':'middle',fill:QCOLORS.tl.lc,'font-size':15,'font-weight':600});
  qlTL.textContent=QCOLORS.tl.label;qlTL.style.opacity='0';qLabels.push(qlTL);
  const qlTR = svgEl('text',{x:MX+(CR-MX)/2, y:CT+40,'text-anchor':'middle','dominant-baseline':'middle',fill:QCOLORS.tr.lc,'font-size':15,'font-weight':600});
  qlTR.textContent=QCOLORS.tr.label;qlTR.style.opacity='0';qLabels.push(qlTR);
  const qlBL = svgEl('text',{x:CL+(MX-CL)/2, y:CB-20,'text-anchor':'middle','dominant-baseline':'middle',fill:QCOLORS.bl.lc,'font-size':15,'font-weight':600});
  qlBL.textContent=QCOLORS.bl.label;qlBL.style.opacity='0';qLabels.push(qlBL);
  const qlBR = svgEl('text',{x:MX+(CR-MX)/2, y:CB-20,'text-anchor':'middle','dominant-baseline':'middle',fill:QCOLORS.br.lc,'font-size':15,'font-weight':600});
  qlBR.textContent=QCOLORS.br.label;qlBR.style.opacity='0';qLabels.push(qlBR);
  addTo(svg, ...qLabels);

  // Company dots
  const dotGroups = [];
  COMPANIES.forEach(c => {
    const {cx, cy} = mapQ(c.qx, c.qy);
    const r = dotR(c.revenueM);
    const q = QCOLORS[c.quadrant] || QCOLORS.c;
    const g = svgEl('g',{'data-id':c.id});
    g.style.opacity = '0';
    g.style.cursor = c.hasDetail ? 'pointer' : 'default';

    // Dot circle
    const circle = svgEl('circle',{cx,cy,r,fill:q.dot,stroke:PROFIT_STROKE[c.profitStatus],'stroke-width':2.5});
    circle.style.opacity='1';
    g.appendChild(circle);

    // Name label
    const labelY = cy + r + 14;
    const label = svgEl('text',{x:cx, y: labelY > CB-10 ? cy - r - 8 : labelY, 'text-anchor':'middle','dominant-baseline':'middle',fill:'#202124','font-size':11,'font-weight':500});
    label.textContent = c.name;
    label.style.opacity='1';
    g.appendChild(label);

    // Revenue label (small, under name)
    if(c.revenueM){
      const revY = labelY > CB-10 ? cy - r - 20 : labelY + 13;
      const rev = svgEl('text',{x:cx, y:revY, 'text-anchor':'middle','dominant-baseline':'middle',fill:'#5f6368','font-size':9,'font-weight':400});
      const fmt = c.revenueM >= 1000 ? `$${(c.revenueM/1000).toFixed(1)}B` : `$${c.revenueM}M`;
      rev.textContent = fmt;
      rev.style.opacity='1';
      g.appendChild(rev);
    }

    svg.appendChild(g);
    dotGroups.push(g);

    // Interaction
    g.addEventListener('mouseenter', e => showTooltip(c, e));
    g.addEventListener('mousemove', e => moveTooltip(e));
    g.addEventListener('mouseleave', hideTooltip);
    if(c.hasDetail){
      g.addEventListener('click', () => openDetail(c.id));
      g.style.cursor = 'pointer';
    }
  });

  return {axH, axV, axLabels, qLabels, dotGroups};
}

/* ── Tooltip ── */
function showTooltip(c, e){
  const tt = $('tooltip');
  const marginCls = c.profitStatus==='pos'?'pos':c.profitStatus==='neg'?'neg':'neu';
  tt.innerHTML = `
    <div class="tt-name">${c.name}</div>
    <div class="tt-role">${c.role}</div>
    <div class="tt-row"><span class="tt-label">收入</span><span class="tt-val">${c.revenueLabel}</span></div>
    ${c.netMargin!=null?`<div class="tt-row"><span class="tt-label">淨利率</span><span class="tt-val ${marginCls}">${c.netMargin}% ${c.netMarginNote?'('+c.netMarginNote+')':''}</span></div>`
      :`<div class="tt-row"><span class="tt-label">淨利率</span><span class="tt-val">${c.netMarginNote||'—'}</span></div>`}
    <div style="margin-top:4px;font-size:12px;color:var(--text2)">${c.tooltip}</div>
    ${c.hasDetail?'<div class="tt-click">點擊查看詳情 →</div>':''}
  `;
  moveTooltip(e);
  tt.classList.add('show');
}
function moveTooltip(e){
  const tt=$('tooltip');
  let x=e.clientX+16, y=e.clientY+16;
  if(x+280>window.innerWidth) x=e.clientX-296;
  if(y+200>window.innerHeight) y=e.clientY-200;
  tt.style.left=x+'px'; tt.style.top=y+'px';
}
function hideTooltip(){ $('tooltip').classList.remove('show'); }

/* ── Detail Panel ── */
function openDetail(id){
  const d = DETAILS[id]; if(!d) return;
  const panel = $('detail-panel');
  const content = $('detail-content');

  content.innerHTML = `
    <div class="detail-badge" style="background:${d.badge.bg};color:${d.badge.color}">${d.badge.text}</div>
    <div class="detail-name">${d.name}</div>
    <div class="detail-role">${d.role}</div>

    <div class="detail-section">
      <h3>關鍵指標</h3>
      <div class="metric-grid">
        ${d.metrics.map(m=>`
          <div class="metric-card">
            <div class="mc-label">${m.label}</div>
            <div class="mc-val ${m.cls}">${m.val}</div>
            <div class="mc-note">${m.note}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="detail-section">
      <h3>點解${d.metrics.some(m=>m.cls==='neg')?'虧損':d.metrics.some(m=>m.cls==='neu')?'勉強打平':'盈利'}？</h3>
      ${d.whyProfit}
    </div>

    <div class="detail-section">
      <h3>核心洞察</h3>
      <p class="detail-text">${d.insight}</p>
    </div>

    <div class="detail-source">數據來源：${d.source}</div>
  `;

  panel.classList.add('open');
  $('backdrop').classList.add('show');

  // Dim other dots
  document.querySelectorAll('#qsvg g[data-id]').forEach(g=>{
    g.style.transition='opacity 200ms var(--ease)';
    g.style.opacity = g.getAttribute('data-id')===id ? '1' : '0.3';
  });
}

function closeDetail(){
  $('detail-panel').classList.remove('open');
  $('backdrop').classList.remove('show');
  document.querySelectorAll('#qsvg g[data-id]').forEach(g=>{
    g.style.opacity='1';
  });
}

$('detail-close').addEventListener('click', closeDetail);
$('backdrop').addEventListener('click', closeDetail);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDetail(); });

      const marginCls = c.profitStatus==='pos'?'pos':c.profitStatus==='neg'?'neg':c.profitStatus==='neu'?'neu':'na';
      const profitIcon = c.profitable===true?'<span class="pos">✓ 盈利</span>':c.profitable===false?'<span class="neg">✗ 虧損</span>':c.profitStatus==='neu'?'<span class="neu">~ 打平</span>':'<span class="na">未知</span>';
      return `<tr${c.hasDetail?' style="cursor:pointer" onclick="openDetail(\''+c.id+'\')"':''}>
        <td><strong>${c.name}</strong></td>
        <td>${c.roleShort}</td>
        <td>${c.revenueLabel}</td>
        <td>${c.grossMargin!=null?c.grossMargin+'%':'—'}</td>
        <td class="${marginCls}">${c.netMargin!=null?c.netMargin+'%'+(c.netMarginNote==='estimation'?' <span class="est">(est.)</span>':''):c.netMarginNote||'—'}</td>
        <td>${profitIcon}</td>
        <td style="font-size:12px;color:var(--text2);max-width:240px">${whyMap[c.id]||'—'}</td>
      </tr>`;
    }).join('')}
    </tbody>
  `;
}

/* ── Init & Animate ── */
async function init(){
  const {axH,axV,axLabels,qLabels,dotGroups} = buildQuadrant();
  buildRoles();
  buildProfitTable();
  buildInsights();

  // Animate quadrant
  await Promise.all([drawPath(axH,600), drawPath(axV,600)]);
  await showAll(qLabels, 100, {dur:400});
  await showAll(axLabels, 80, {dur:400, dy:8});

  // Dots by quadrant group
  const groups = {};
  dotGroups.forEach(g=>{
    const id = g.getAttribute('data-id');
    const c = COMPANIES.find(x=>x.id===id);
    const q = c?c.quadrant:'c';
    if(!groups[q]) groups[q]=[];
    groups[q].push(g);
  });
  for(const q of ['tl','tr','bl','br']){
    if(groups[q]) await showAll(groups[q], 120, {dur:350, scale:0});
  }

  // Animate below-fold on scroll
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.style.transition='opacity 500ms var(--ease), transform 500ms var(--ease)';
        entry.target.style.opacity='1';
        entry.target.style.transform='translateY(0)';
        observer.unobserve(entry.target);
      }
    });
  },{threshold:0.1});

  document.querySelectorAll('.summary-section').forEach(s=>{
    s.style.opacity='0';
    s.style.transform='translateY(20px)';
    observer.observe(s);
  });
}

init();
</script>
