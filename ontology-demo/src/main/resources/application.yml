spring:
  datasource:
    url: jdbc:h2:file:./data/ontologydemo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: never
  main:
    banner-mode: "off"

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-4-20250514

logging:
  level:
    com.warehouse.ontology: INFO
